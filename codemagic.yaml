workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - ios_signing
      flutter: 3.44.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Set up code signing
        script: |
          # p12をデコード
          printf '%s' "$CM_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          echo "p12 size: $(wc -c < /tmp/certificate.p12) bytes"
          # Codemagicキーチェーンにインポート
          keychain add-certificates \
            --certificate /tmp/certificate.p12 \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"
          echo "=== Signing identities ==="
          security find-identity -v -p codesigning
          # プロビジョニングプロファイルをインストール
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp ios/PocketDIC_AppStore.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "Profile installed"
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Build IPA
        script: |
          cat > /tmp/export_options.plist << 'PLIST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>X6RN697XPY</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.yamasaki.pocketdic</key>
                  <string>PocketDIC_AppStore</string>
              </dict>
          </dict>
          </plist>
          PLIST_EOF
          flutter build ipa --release --export-options-plist=/tmp/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
