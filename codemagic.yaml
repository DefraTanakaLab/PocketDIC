workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - ios_signing
      flutter: 3.44.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Set up code signing
        script: |
          printf '%s' "$CM_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp ios/PocketDIC_AppStore.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Build iOS release
        script: |
          flutter build ios --release --no-codesign
      - name: Build IPA
        script: |
          # export_options.plistを作成
          cat > /tmp/export_options.plist << 'PLIST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>X6RN697XPY</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.yamasaki.pocketdic</key>
                  <string>PocketDIC_AppStore</string>
              </dict>
          </dict>
          </plist>
          PLIST_EOF
          # アーカイブ
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath /tmp/Runner.xcarchive \
            DEVELOPMENT_TEAM=X6RN697XPY \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="PocketDIC_AppStore" \
            archive
          # IPA書き出し
          xcodebuild -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportOptionsPlist /tmp/export_options.plist \
            -exportPath build/ios/ipa
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
